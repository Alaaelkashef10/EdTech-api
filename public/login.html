<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — EduFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-gray-950 text-white min-h-screen flex items-center justify-center px-4">

  <div class="auth-card w-full max-w-md p-8 rounded-2xl">

    <div class="text-center mb-8">
      <a href="/" class="logo text-2xl font-bold text-cyan-400">Edu<span class="text-white">Flow</span></a>
      <h2 class="text-2xl font-bold mt-4">Welcome back</h2>
      <p class="text-gray-400 text-sm mt-1">Sign in to continue learning</p>
    </div>

    <!-- Error -->
    <div id="error-msg" class="hidden mb-4 px-4 py-3 rounded-lg bg-red-500/10 border border-red-500/30 text-red-400 text-sm"></div>

    <!-- Form -->
    <div class="space-y-4">
      <div class="input-group">
        <label class="text-xs text-gray-400 font-medium mb-1 block">Email</label>
        <input type="email" id="email" placeholder="you@example.com" class="input-field w-full px-4 py-3 rounded-xl text-sm"/>
      </div>
      <div class="input-group">
        <label class="text-xs text-gray-400 font-medium mb-1 block">Password</label>
        <input type="password" id="password" placeholder="••••••••" class="input-field w-full px-4 py-3 rounded-xl text-sm"/>
      </div>

      <button onclick="login()" id="login-btn" class="btn-primary w-full py-3 rounded-xl font-semibold text-sm mt-2">
        Sign In
      </button>
    </div>

    <p class="text-center text-gray-400 text-sm mt-6">
      Don't have an account? <a href="/register.html" class="text-cyan-400 hover:underline">Sign up</a>
    </p>

  </div>

  <script src="/js/auth.js"></script>
</body>
</html>
