<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EduFlow — Learn Without Limits</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-gray-950 text-white min-h-screen">

  <!-- Navbar -->
  <nav class="fixed top-0 w-full z-50 glass-nav px-6 py-4 flex items-center justify-between">
    <a href="/" class="logo text-2xl font-bold text-cyan-400">Edu<span class="text-white">Flow</span></a>
    <div class="flex items-center gap-4" id="nav-auth">
      <a href="/login.html" class="text-gray-300 hover:text-white transition text-sm font-medium">Login</a>
      <a href="/register.html" class="btn-primary text-sm px-4 py-2 rounded-lg">Get Started</a>
    </div>
  </nav>

  <!-- Hero -->
  <section class="hero-section pt-32 pb-20 px-6 text-center relative overflow-hidden">
    <div class="hero-glow"></div>
    <div class="relative z-10 max-w-4xl mx-auto">
      <div class="badge mb-6 inline-flex items-center gap-2 px-4 py-2 rounded-full text-xs font-semibold text-cyan-400 border border-cyan-400/30 bg-cyan-400/10">
        <span class="w-2 h-2 rounded-full bg-cyan-400 animate-pulse"></span>
        100K+ Courses Available
      </div>
      <h1 class="hero-title text-5xl md:text-7xl font-extrabold leading-tight mb-6">
        Learn <span class="gradient-text">Anything.</span><br/>Become <span class="gradient-text">Anyone.</span>
      </h1>
      <p class="text-gray-400 text-lg md:text-xl max-w-2xl mx-auto mb-10 font-light">
        Master in-demand skills with world-class instructors. Start your journey today.
      </p>
      <div class="flex flex-col sm:flex-row gap-4 justify-center">
        <a href="/register.html" class="btn-primary px-8 py-4 rounded-xl text-base font-semibold">Start Learning Free</a>
        <a href="#courses" class="btn-ghost px-8 py-4 rounded-xl text-base font-semibold">Browse Courses</a>
      </div>
    </div>
  </section>

  <!-- Courses Section -->
  <section id="courses" class="px-6 pb-20 max-w-7xl mx-auto">
    <div class="flex items-center justify-between mb-10">
      <div>
        <h2 class="text-3xl font-bold">Featured Courses</h2>
        <p class="text-gray-400 mt-1 text-sm">Handpicked by our team</p>
      </div>
      <div class="search-box flex items-center gap-2 bg-gray-900 border border-gray-800 rounded-xl px-4 py-2">
        <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
        <input type="text" id="search-input" placeholder="Search courses..." class="bg-transparent text-sm text-white placeholder-gray-500 outline-none w-48"/>
      </div>
    </div>

    <!-- Loading -->
    <div id="loading" class="text-center py-20">
      <div class="spinner mx-auto mb-4"></div>
      <p class="text-gray-500 text-sm">Loading courses...</p>
    </div>

    <!-- Empty -->
    <div id="empty" class="hidden text-center py-20">
      <p class="text-gray-500 text-lg">No courses found.</p>
    </div>

    <!-- Courses Grid -->
    <div id="courses-grid" class="hidden grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
  </section>

  <script src="/js/main.js"></script>
</body>
</html>
