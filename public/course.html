<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Course — EduFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-gray-950 text-white min-h-screen">

  <!-- Navbar -->
  <nav class="fixed top-0 w-full z-50 glass-nav px-6 py-4 flex items-center justify-between">
    <a href="/" class="logo text-2xl font-bold text-cyan-400">Edu<span class="text-white">Flow</span></a>
    <div class="flex items-center gap-4" id="nav-auth"></div>
  </nav>

  <!-- Course Hero -->
  <section class="pt-24 pb-10 px-6 max-w-6xl mx-auto">
    <div id="course-loading" class="text-center py-20">
      <div class="spinner mx-auto mb-4"></div>
      <p class="text-gray-500 text-sm">Loading course...</p>
    </div>

    <div id="course-content" class="hidden">
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">

        <!-- Left: Course Info -->
        <div class="lg:col-span-2">
          <div class="mb-2">
            <span class="text-xs text-cyan-400 font-semibold uppercase tracking-widest">Course</span>
          </div>
          <h1 id="course-title" class="text-3xl md:text-4xl font-extrabold mb-4"></h1>
          <p id="course-description" class="text-gray-400 text-base leading-relaxed mb-6"></p>

          <div class="flex items-center gap-3 mb-8">
            <div class="w-9 h-9 rounded-full bg-cyan-500/20 flex items-center justify-center text-cyan-400 font-bold text-sm" id="instructor-avatar"></div>
            <div>
              <p class="text-xs text-gray-500">Instructor</p>
              <p class="text-sm font-semibold" id="instructor-name"></p>
            </div>
          </div>

          <!-- Progress Bar (shown if enrolled) -->
          <div id="progress-section" class="hidden mb-8 p-4 rounded-xl bg-gray-900 border border-gray-800">
            <div class="flex items-center justify-between mb-2">
              <span class="text-sm font-medium">Your Progress</span>
              <span class="text-sm text-cyan-400 font-bold" id="progress-percent">0%</span>
            </div>
            <div class="progress-bar-bg rounded-full h-2">
              <div class="progress-bar-fill h-2 rounded-full transition-all duration-700" id="progress-bar" style="width:0%"></div>
            </div>
            <p class="text-xs text-gray-500 mt-2" id="progress-label"></p>
          </div>

          <!-- Lessons -->
          <div>
            <h2 class="text-xl font-bold mb-4">Course Content</h2>
            <div id="lessons-loading" class="text-gray-500 text-sm py-4">Loading lessons...</div>
            <div id="lessons-list" class="hidden space-y-3"></div>
          </div>
        </div>

        <!-- Right: Enroll Card -->
        <div class="lg:col-span-1">
          <div class="sticky top-24 enroll-card rounded-2xl overflow-hidden">
            <img id="course-thumbnail" src="" alt="Course Thumbnail" class="w-full h-48 object-cover"/>
            <div class="p-6">
              <div class="flex items-center gap-2 mb-4">
                <span class="text-2xl font-extrabold text-white">Free</span>
              </div>
              <button id="enroll-btn" onclick="enrollCourse()" class="btn-primary w-full py-3 rounded-xl font-semibold text-sm mb-3">
                Enroll Now
              </button>
              <p id="enroll-msg" class="text-center text-xs text-gray-500"></p>
              <div class="mt-4 space-y-2 text-xs text-gray-400">
                <div class="flex items-center gap-2">
                  <span>✅</span> Full lifetime access
                </div>
                <div class="flex items-center gap-2">
                  <span>📱</span> Access on all devices
                </div>
                <div class="flex items-center gap-2">
                  <span>🏆</span> Certificate of completion
                </div>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </section>

  <script src="/js/course.js"></script>
</body>
</html>
